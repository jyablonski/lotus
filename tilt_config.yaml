# Tilt Configuration File
# Set services to true to enable them, false to disable them
# After changing this file, Tilt will automatically reload
# note: this should normally not be in version control, as it's specific to every dev.
# but this is my project so fuck it.

services:
  enabled:
    # core application services
    frontend: true
    backend: true
    analyzer: true
    django_admin: true

    # data services
    dagster: true

  # infrastructure services
  infrastructure:
    postgres: true
    redis: true
    redisinsight: true
    mlflow: true
    observability: true

# note: these aren't used, but are examples of how to split out
# local infra vs shared (cloud) infra
options:
  shared-database: true
