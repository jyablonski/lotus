repos:
  # go hooks for sqlc and protobuf
  - repo: local
    hooks:
      - id: sqlc-generate
        name: sqlc generate
        entry: scripts/sqlc-generate.sh
        language: system
        files: ^services/backend/internal/sql/
        pass_filenames: false
      - id: buf-generate
        name: buf generate
        entry: scripts/buf-generate.sh
        language: system
        files: ^services/backend/proto/
        pass_filenames: false
      - id: moq-generate
        name: moq generate
        entry: scripts/moq-generate.sh
        language: system
        files: ^services/backend/internal/(db/querier\.go|inject/inject\.go)$
        pass_filenames: false
      - id: bruno-generate
        name: bruno generate
        entry: scripts/bruno-generate.sh
        language: system
        files: ^(services/backend/proto/|services/analyzer/src/(main\.py|routers/|schemas/))
        pass_filenames: false

  # General purpose linters and formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Shell script linting
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # Go linters & formatters
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt

  - repo: local
    hooks:
      # go vet catches common correctness issues (e.g. misused printf verbs, unreachable code, suspicious composite literals)
      - id: go-vet
        name: go vet (backend)
        entry: bash -c 'cd services/backend && go vet ./...'
        language: system
        files: ^services/backend/.*\.go$
        pass_filenames: false
      # deadcode traces all reachable symbols from main + test entry points and flags unexported functions/types with no callers
      - id: go-deadcode
        name: deadcode (backend)
        entry: bash -c 'cd services/backend && $(go env GOPATH)/bin/deadcode -test ./...'
        language: system
        files: ^services/backend/.*\.go$
        pass_filenames: false
      # golangci-lint runs a comprehensive suite of linters (gosec, gocritic, staticcheck, etc.)
      - id: golangci-lint
        name: golangci-lint (backend)
        entry: bash -c 'cd services/backend && $(go env GOPATH)/bin/golangci-lint run ./...'
        language: system
        files: ^services/backend/.*\.go$
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: "\\.(js|jsx|ts|tsx|json|css|scss|md|yaml|yml)$"
        args: ["--write", "--no-cache"]

  # JSON and YAML validation
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          [
            -d,
            "{extends: default, rules: {document-start: disable, line-length: disable}}",
          ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: lint-bruno
        name: Bruno auth lint
        entry: bash scripts/lint-bruno.sh
        language: system
        files: ^bruno/.*\.bru$
        pass_filenames: false

  - repo: local
    hooks:
      - id: tsc-frontend
        name: tsc (frontend)
        entry: bash -c 'cd services/frontend && npm run typecheck'
        language: system
        files: ^services/frontend/.*\.(ts|tsx)$
        pass_filenames: false

  # Pre-push hooks — run via `pre-commit install --hook-type pre-push`
  - repo: local
    hooks:
      - id: go-test-short
        name: go test -short (backend)
        entry: bash -c 'cd services/backend && go test -short -count=1 ./...'
        language: system
        stages: [pre-push]
        files: ^services/backend/.*\.go$
        pass_filenames: false
      - id: dbt-source-schema-sync
        name: dbt source schema sync (django)
        entry: bash -c 'make generate-dbt-source-schema && git diff --exit-code -- docker/db/generated/ci_source_schema.sql'
        language: system
        stages: [pre-push]
        files: ^(services/django/|services/dbt/models/sources/application_db/)
        pass_filenames: false
