syntax = "proto3";

package journal;

option go_package = "github.com/jyablonski/lotus/internal/pb/proto/journal;journal_pb";

// Request/Response messages for Journal operations

message CreateJournalRequest {
  string user_id = 1;
  string journal_text = 2;
  string user_mood = 3;
}

message CreateJournalResponse {
  string journal_id = 1;
}

message GetJournalsRequest {
  string user_id = 1;
  int32 limit = 2;   // optional - defaults to 50 if not provided
  int32 offset = 3;  // optional - defaults to 0 if not provided
}

message JournalEntry {
  string journal_id = 1;
  string user_id = 2;
  string journal_text = 3;
  string user_mood = 4;
  string created_at = 5;
  repeated string topic_names = 6;  // OpenAI-generated topic tags (async, may be empty)
}

message GetJournalsResponse {
  repeated JournalEntry journals = 1;
  int64 total_count = 2;  // total number of journals for this user
  bool has_more = 3;      // true if there are more results beyond this page
}

message TriggerAnalysisRequest {
  string journal_id = 1;
}

message TriggerAnalysisResponse {
  bool success = 1;
  string message = 2;
}

message SearchJournalsRequest {
  string user_id = 1;
  string query = 2;
  int32 limit = 3;  // optional - defaults to 20 if not provided
}

message SearchJournalsResponse {
  repeated JournalSearchResult results = 1;
}

message JournalSearchResult {
  JournalEntry journal = 1;
  float similarity_score = 2;
}

message KeywordSearchJournalsRequest {
  string user_id = 1;
  string query = 2;
  int32 limit = 3;  // optional - defaults to 20 if not provided
}

message KeywordSearchJournalsResponse {
  repeated KeywordSearchResult results = 1;
}

message KeywordSearchResult {
  JournalEntry journal = 1;
  float rank = 2;  // ts_rank score from PostgreSQL full-text search
}

message GetJournalRequest {
  string journal_id = 1;
  string user_id = 2;
}

message GetJournalResponse {
  JournalEntry journal = 1;
}

message UpdateJournalRequest {
  string journal_id = 1;
  string user_id = 2;
  string journal_text = 3;
  string user_mood = 4;
}

message UpdateJournalResponse {
  JournalEntry journal = 1;
}

message DeleteJournalRequest {
  string journal_id = 1;
  string user_id = 2;
}

message DeleteJournalResponse {
  bool success = 1;
}
