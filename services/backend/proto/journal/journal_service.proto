syntax = "proto3";

package journal;

option go_package = "github.com/jyablonski/lotus/internal/pb/proto/journal;journal_pb";

import "google/api/annotations.proto";
import "proto/journal/journal.proto";

service JournalService {
  rpc CreateJournal(CreateJournalRequest) returns (CreateJournalResponse) {
    option (google.api.http) = {
      post: "/v1/journals"
      body: "*"
    };
  }

  // GET http://localhost:8080/v1/journals?user_id=USER_ID_HERE&limit=10&offset=20
  rpc GetJournals(GetJournalsRequest) returns (GetJournalsResponse) {
    option (google.api.http) = {
      get: "/v1/journals"
    };
  }

  rpc GetJournal(GetJournalRequest) returns (GetJournalResponse) {
    option (google.api.http) = {
      get: "/v1/journals/{journal_id}"
    };
  }

  rpc UpdateJournal(UpdateJournalRequest) returns (UpdateJournalResponse) {
    option (google.api.http) = {
      patch: "/v1/journals/{journal_id}"
      body: "*"
    };
  }

  rpc DeleteJournal(DeleteJournalRequest) returns (DeleteJournalResponse) {
    option (google.api.http) = {
      delete: "/v1/journals/{journal_id}"
    };
  }

  rpc TriggerJournalAnalysis(TriggerAnalysisRequest) returns (TriggerAnalysisResponse) {
    option (google.api.http) = {
      post: "/v1/journals/{journal_id}/analysis"
    };
  }

  rpc SearchJournals(SearchJournalsRequest) returns (SearchJournalsResponse) {
    option (google.api.http) = {
      post: "/v1/journals/search"
      body: "*"
    };
  }

  rpc KeywordSearchJournals(KeywordSearchJournalsRequest) returns (KeywordSearchJournalsResponse) {
    option (google.api.http) = {
      post: "/v1/journals/keyword-search"
      body: "*"
    };
  }
}
