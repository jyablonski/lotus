syntax = "proto3";

package user;

option go_package = "github.com/jyablonski/lotus/internal/pb/proto/user;user_pb";

// Request/Response messages for User operations

message CreateUserRequest {
  string email = 1;
  string password = 2;
}

message CreateUserOauthRequest {
  string email = 1;
  string oauth_provider = 2;
}

message CreateUserResponse {
  string user_id = 1;
}

message GetUserRequest {
  string email = 1;
}

message GetUserResponse {
  string user_id = 1;
  string email = 2;
  string role = 3;
  string timezone = 4;
  string created_at = 5;
  string updated_at = 6;
  bool community_insights_opt_in = 7;
  bool community_location_opt_in = 8;
  string community_country_code = 9;
  string community_region_code = 10;
}

message UpdateUserTimezoneRequest {
  string user_id = 1;
  string timezone = 2;
}

message UpdateUserTimezoneResponse {
  string user_id = 1;
  string timezone = 2;
  string updated_at = 3;
}

message UpdateCommunitySettingsRequest {
  string user_id = 1;
  bool community_insights_opt_in = 2;
  bool community_location_opt_in = 3;
  string community_country_code = 4;
  string community_region_code = 5;
}

message UpdateCommunitySettingsResponse {
  string user_id = 1;
  bool community_insights_opt_in = 2;
  bool community_location_opt_in = 3;
  string community_country_code = 4;
  string community_region_code = 5;
  string updated_at = 6;
}
