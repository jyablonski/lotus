# Reusable E2E workflow. Not triggered by events; called by frontend, backend,
# and django pipelines at the end of each. Exercises full stack with Playwright.
name: E2E

on:
  workflow_call:

jobs:
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AUTH_SECRET: e2e-test-secret-at-least-32-characters-long

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose -f docker/docker-compose-e2e.yaml up -d --build

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend at http://localhost:3000 ..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start within 120s"
          docker compose -f docker/docker-compose-e2e.yaml logs
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies (e2e-only, skip pact postinstall)
        working-directory: services/frontend
        run: npm ci --ignore-scripts
        # --ignore-scripts skips pact-node's 50MB binary download which is
        # not needed for e2e tests and fails intermittently on checksum.

      - name: Install Playwright browsers
        working-directory: services/frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: services/frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Stop services
        if: always()
        run: docker compose -f docker/docker-compose-e2e.yaml down -v
