name: SQL Quality Checks

on:
  push:
    branches:
      - main
    paths:
      - "services/dbt/**"
      - ".github/workflows/quality-sql.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "services/dbt/**"
      - ".github/workflows/quality-sql.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.8"
  PYTHON_VERSION: "3.13"

jobs:
  sqlfluff:
    name: SQLFluff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: services/dbt/uv.lock
          working-directory: services/dbt

      - name: Install dependencies
        working-directory: services/dbt
        run: uv sync --locked --all-groups

      - name: SQLFluff lint
        working-directory: services/dbt
        run: >
          uv run sqlfluff lint models macros
          --templater jinja
          --format github-annotation-native
          --annotation-level failure
          --disable-progress-bar
