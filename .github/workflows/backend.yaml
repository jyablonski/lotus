name: Backend CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            services/backend/go.sum

      - name: Start Postgres
        run: make start-postgres

      - name: Run Backend Tests
        working-directory: services/backend
        run: |
          go tool gotestsum --format testdox -- ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/grpc,./internal/utils

      - name: Stop Postgres
        if: always()
        run: make stop-postgres

  # k6 smoke test against a live backend via Docker Compose.
  # Runs k6 inside the same Docker network as the backend so it can reach
  # http://backend:8080 directly — no host port mapping needed.
  k6-smoke:
    runs-on: ubuntu-latest
    needs: backend-pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false

      - name: Start backend stack
        run: |
          docker compose -f docker/docker-compose-e2e.yaml --profile load-test up -d --build --wait postgres backend

      - name: Run k6 HTTP smoke test
        run: |
          docker compose -f docker/docker-compose-e2e.yaml --profile load-test run k6 run /scripts/http-gateway-load.js

      - name: Backend logs
        if: failure()
        run: docker compose -f docker/docker-compose-e2e.yaml logs backend

      - name: Stop e2e stack
        if: always()
        run: docker compose -f docker/docker-compose-e2e.yaml --profile load-test down -v
