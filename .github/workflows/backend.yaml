name: Backend CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: services/backend/go.mod
          cache-dependency-path: services/backend/go.sum

      - name: Install Pact FFI
        working-directory: services/backend
        run: |
          go install github.com/pact-foundation/pact-go/v2@v2.4.2
          sudo "$(go env GOPATH)/bin/pact-go" -l DEBUG install --libDir /usr/local/lib

      - name: Run Tests
        working-directory: services/backend
        run: |
          set -o pipefail
          go test -race -json -cover -covermode=atomic \
            -coverprofile=coverage.txt \
            -coverpkg=./internal/grpc,./internal/http,./internal/utils \
            ./... | \
            go tool github.com/mfridman/tparse -all -progress -format markdown | \
            tee --append "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: services/backend/coverage.txt

      - name: Contract tests
        working-directory: services/backend
        run: go test -tags=contract ./internal/grpc/contract_test/ -v -run TestBackendAnalyzerContract

  coverage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:
      - uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: backend-coverage
          coverage-file-name: coverage.txt
          trim: github.com/jyablonski/lotus
          exclude: .+\.pb(\.gw)?\.go$

  # k6 smoke test against a live backend via Docker Compose.
  # Uses docker-compose-k6.yaml (postgres + backend only) so CI
  # does not need other services when sparse checkout only has backend/docker.
  k6-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false

      - name: Start backend stack
        env:
          BACKEND_API_KEY: lotus-backend-dev-key
          ANALYZER_API_KEY: lotus-analyzer-dev-key
        run: |
          docker compose -f docker/docker-compose-k6.yaml --profile load-test up -d --build --wait postgres backend

      - name: Run k6 HTTP smoke test
        env:
          BACKEND_API_KEY: lotus-backend-dev-key
        run: |
          docker compose -f docker/docker-compose-k6.yaml --profile load-test run k6 run /scripts/http-gateway-load.js

      - name: Backend logs
        if: failure()
        run: docker compose -f docker/docker-compose-k6.yaml logs backend

      - name: Stop stack
        if: always()
        run: docker compose -f docker/docker-compose-k6.yaml --profile load-test down -v

  e2e:
    needs: k6-smoke
    uses: ./.github/workflows/e2e.yaml
