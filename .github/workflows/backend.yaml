name: Backend CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 65

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest
    name: Test Suite
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            services/backend/go.sum

      - name: Install Pact FFI
        working-directory: services/backend
        run: |
          go install github.com/pact-foundation/pact-go/v2@v2.4.2
          sudo "$(go env GOPATH)/bin/pact-go" -l DEBUG install --libDir /usr/local/lib

      - name: Run Backend Tests
        run: make test-backend

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: services/backend/coverage.out
          format: golang

      - name: Enforce ${{ env.COVERAGE_THRESHOLD }}% coverage threshold
        run: |
          total=$(go tool cover -func=services/backend/coverage.out | awk '/^total:/{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          awk -v t="$total" -v threshold="$COVERAGE_THRESHOLD" 'BEGIN { if (t+0 < threshold+0) { print "Coverage " t "% is below " threshold "% threshold"; exit 1 } }'

      - name: Run contract tests
        working-directory: services/backend
        run: go test -tags=contract ./internal/grpc/contract_test/ -v -run TestBackendAnalyzerContract

  # k6 smoke test against a live backend via Docker Compose (postgres, django
  # migrations, redis, backend).
  k6-smoke:
    runs-on: ubuntu-latest
    needs: backend-pipeline
    name: Load Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            services/django/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false

      - name: Start backend stack
        env:
          BACKEND_API_KEY: lotus-backend-dev-key
          ANALYZER_API_KEY: lotus-analyzer-dev-key
        run: |
          docker compose -f docker/docker-compose-k6.yaml --profile load-test up -d --build --wait postgres redis django backend

      - name: Run k6 HTTP smoke test
        env:
          BACKEND_API_KEY: lotus-backend-dev-key
        run: |
          docker compose -f docker/docker-compose-k6.yaml --profile load-test run k6 run /scripts/http-gateway-load.js

      - name: Backend logs
        if: failure()
        run: docker compose -f docker/docker-compose-k6.yaml logs backend django

      - name: Stop stack
        if: always()
        run: docker compose -f docker/docker-compose-k6.yaml --profile load-test down -v
