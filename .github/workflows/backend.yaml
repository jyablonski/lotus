name: Backend CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            services/backend/go.sum

      - name: Install Pact FFI
        working-directory: services/backend
        run: |
          go install github.com/pact-foundation/pact-go/v2@v2.4.2
          sudo "$(go env GOPATH)/bin/pact-go" -l DEBUG install --libDir /usr/local/lib

      - name: Start Postgres
        run: make start-postgres

      - name: Run Backend Tests
        working-directory: services/backend
        run: |
          go tool gotestsum --format testdox -- ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/grpc,./internal/utils

      - name: Run contract tests
        working-directory: services/backend
        run: go test -tags=contract ./internal/grpc/contract_test/ -v -run TestBackendAnalyzerContract

      - name: Stop Postgres
        if: always()
        run: make stop-postgres

  # k6 smoke test against a live backend via Docker Compose.
  # Uses docker-compose-k6.yaml (postgres + backend only, no Django) so CI
  # does not need services/django when sparse checkout only has backend/docker.
  k6-smoke:
    runs-on: ubuntu-latest
    needs: backend-pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false

      - name: Start backend stack
        run: |
          docker compose -f docker/docker-compose-k6.yaml --profile load-test up -d --build --wait postgres backend

      - name: Run k6 HTTP smoke test
        run: |
          docker compose -f docker/docker-compose-k6.yaml --profile load-test run k6 run /scripts/http-gateway-load.js

      - name: Backend logs
        if: failure()
        run: docker compose -f docker/docker-compose-k6.yaml logs backend

      - name: Stop stack
        if: always()
        run: docker compose -f docker/docker-compose-k6.yaml --profile load-test down -v

  e2e:
    needs: k6-smoke
    uses: ./.github/workflows/e2e.yaml
