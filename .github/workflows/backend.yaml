name: Backend CI / CD Pipeline

on:
  pull_request:
    paths:
      - "services/backend/**"

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            services/backend/go.sum

      - name: Start Postgres
        run: make start-postgres

      - name: Run Backend Tests
        working-directory: services/backend
        run: |
          go tool gotestsum --format testdox -- ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/grpc,./internal/utils

      - name: Stop Postgres
        if: always()
        run: make stop-postgres

  # Optional: k6 smoke test against a live backend.
  # Runs the HTTP gateway smoke test to verify endpoints respond under light load.
  k6-smoke:
    runs-on: ubuntu-latest
    needs: backend-pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false

      - name: Start e2e stack
        run: |
          docker compose -f docker/docker-compose-e2e.yaml up -d --build --wait postgres backend

      - name: Run k6 HTTP smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: services/backend/load-tests/scripts/http-gateway-load.js
        env:
          BASE_URL: http://localhost:8080

      - name: Stop e2e stack
        if: always()
        run: docker compose -f docker/docker-compose-e2e.yaml down -v
