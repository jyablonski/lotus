name: Backend CI / CD Pipeline

on:
  pull_request:
    paths:
      - "services/backend/**"

env:
  GOTESTSUM_VERSION: "1.13.0"

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            services/backend/go.sum

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v${{ env.GOTESTSUM_VERSION }}

      - name: Start Postgres
        run: make start-postgres

      - name: Run Backend Tests
        working-directory: services/backend
        run: |
          go test ./... -v -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/grpc,./internal/http,./internal/utils

      - name: Stop Postgres
        if: always()
        run: make stop-postgres
