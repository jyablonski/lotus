name: Backend CI / CD Pipeline

on:
  pull_request:
    paths:
      - "services/backend/**"

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            services/backend/go.sum

      - name: Start Postgres
        run: make start-postgres

      - name: Run Backend Tests
        working-directory: services/backend
        run: |
          go tool gotestsum --format testdox -- ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/grpc,./internal/utils

      - name: Stop Postgres
        if: always()
        run: make stop-postgres
