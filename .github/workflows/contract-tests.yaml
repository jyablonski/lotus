name: Contract Tests

on:
  push:
    branches:
      - main
    paths:
      - "services/frontend/**"
      - "services/backend/**"
      - "services/analyzer/**"
      - ".github/workflows/contract-tests.yaml"
  pull_request:
    types: [opened, synchronize, labeled]
    paths:
      - "services/frontend/**"
      - "services/backend/**"
      - "services/analyzer/**"
      - ".github/workflows/contract-tests.yaml"

# workflow triggers:
# 1. PR title contains "contract" — e.g. "Add contract tests for analyzer"
# 2. Any push to main that touches service paths
# 3. PR has the contract-tests label

jobs:
  should-run:
    name: Check Contract Test Triggers
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] ||
             [[ "${{ contains(github.event.pull_request.title, 'contract') }}" == "true" ]] ||
             [[ "${{ contains(join(github.event.pull_request.labels.*.name, ','), 'contract-tests') }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  frontend-consumer:
    name: Frontend Consumer Contract Tests
    runs-on: ubuntu-latest
    needs: should-run
    if: needs.should-run.outputs.run == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/frontend/**
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Run contract tests
        working-directory: services/frontend
        run: npm run test:contract

  backend-consumer:
    name: Backend Consumer Contract Tests
    runs-on: ubuntu-latest
    needs: should-run
    if: needs.should-run.outputs.run == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/backend/**
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            services/backend/go.sum

      - name: Install Pact FFI
        working-directory: services/backend
        run: |
          go install github.com/pact-foundation/pact-go/v2@v2.4.2
          sudo "$(go env GOPATH)/bin/pact-go" -l DEBUG install --libDir /usr/local/lib

      - name: Run contract tests
        working-directory: services/backend
        run: go test -tags=contract ./internal/grpc/contract_test/ -v -run TestBackendAnalyzerContract
