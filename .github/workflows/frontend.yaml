name: Frontend CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/frontend/**"
      - ".github/workflows/frontend.yaml"
  pull_request:
    paths:
      - "services/frontend/**"
      - ".github/workflows/frontend.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 75

jobs:
  frontend-pipeline:
    runs-on: ubuntu-latest
    name: Test Suite
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/frontend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        working-directory: services/frontend
        run: npm install

      - name: Run tests with coverage
        working-directory: services/frontend
        run: npm run test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: services/frontend/coverage/lcov.info

      - name: Enforce ${{ env.COVERAGE_THRESHOLD }}% coverage threshold
        run: |
          total=$(node -e "const s=require('./services/frontend/coverage/coverage-summary.json'); console.log(s.total.statements.pct)")
          echo "Total coverage: ${total}%"
          awk -v t="$total" -v threshold="$COVERAGE_THRESHOLD" 'BEGIN { if (t+0 < threshold+0) { print "Coverage " t "% is below " threshold "% threshold"; exit 1 } }'

      - name: Run contract tests
        working-directory: services/frontend
        run: npm run test:contract

      - name: Build project
        working-directory: services/frontend
        run: npm run build
