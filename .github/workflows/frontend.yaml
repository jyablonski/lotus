name: Frontend CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/frontend/**"
  pull_request:
    paths:
      - "services/frontend/**"

jobs:
  frontend-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            services/frontend/**
            docker/**
            Makefile
          sparse-checkout-cone-mode: false
          # needed to checkout only a single file

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        working-directory: services/frontend
        run: npm install

      - name: Run tests
        working-directory: services/frontend
        run: npm run test:ci

      - name: Build project
        working-directory: services/frontend
        run: npm run build

  e2e:
    needs: frontend-pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AUTH_SECRET: e2e-test-secret-at-least-32-characters-long

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Start the stack via docker compose ───────────────────────
      - name: Build and start services
        run: docker compose -f docker/docker-compose-e2e.yaml up -d --build

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend at http://localhost:3000 ..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start within 120s"
          docker compose -f docker/docker-compose-e2e.yaml logs
          exit 1

      # ── Run Playwright on the host ───────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: services/frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: services/frontend
        run: npx playwright test --reporter=github
        env:
          BASE_URL: http://localhost:3000

      # ── Cleanup and artifacts ────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: services/frontend/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose -f docker/docker-compose-e2e.yaml down -v
