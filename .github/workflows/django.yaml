name: Django CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/django/**"
      - ".github/workflows/django.yaml"
  pull_request:
    paths:
      - "services/django/**"
      - ".github/workflows/django.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 80
  UV_VERSION: "0.10.9"
  PYTHON_VERSION: "3.13"

jobs:
  django-pipeline:
    runs-on: ubuntu-latest
    name: Test Suite

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            services/django/**
            services/dbt/models/sources/application_db/**
            docker/**
            scripts/generate-dbt-source-schema.sh
            Makefile
          sparse-checkout-cone-mode: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION}}
          enable-cache: true
          prune-cache: false
          working-directory: services/django

      - name: Start Services
        run: make start-postgres

      - name: Run Test Suite
        working-directory: services/django
        run: uv run pytest

      - name: Enforce ${{ env.COVERAGE_THRESHOLD }}% coverage threshold
        working-directory: services/django
        run: |
          uv run coverage json -o coverage.json
          total=$(uv run python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered'])")
          echo "Total coverage: ${total}%"
          awk -v t="$total" -v threshold="$COVERAGE_THRESHOLD" 'BEGIN { if (t+0 < threshold+0) { print "Coverage " t "% is below " threshold "% threshold"; exit 1 } }'

      - name: Shutdown Services
        if: always()
        run: make stop-postgres
