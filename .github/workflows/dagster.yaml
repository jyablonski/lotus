name: Dagster CI / CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "services/dagster/**"
      - "docker/db/generated/ci_source_schema.sql"
      - ".github/workflows/dagster.yaml"
  pull_request:
    paths:
      - "services/dagster/**"
      - "docker/db/generated/ci_source_schema.sql"
      - ".github/workflows/dagster.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 80
  UV_VERSION: "0.10.9"
  PYTHON_VERSION: "3.13"

jobs:
  dagster-pipeline:
    runs-on: ubuntu-latest
    name: Test Suite

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            services/dagster/**
            services/dbt/**
            docker/db/generated/ci_source_schema.sql
          sparse-checkout-cone-mode: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION}}
          enable-cache: true
          prune-cache: false
          working-directory: services/dagster

      - name: Run Tests
        working-directory: services/dagster
        run: uv run pytest --cov-fail-under=${COVERAGE_THRESHOLD}
