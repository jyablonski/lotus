# Docker Compose configuration for e2e tests.
# Spins up postgres, django (migrations), backend, and frontend with source
# baked into images (no volume mounts). Playwright runs on the host against localhost:3000.
#
# Usage:
#   docker compose -f docker/docker-compose-e2e.yaml up -d --build --wait
#   cd services/frontend && npm run test:e2e
#   docker compose -f docker/docker-compose-e2e.yaml down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: e2e-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  django:
    build:
      context: ../services/django
      dockerfile: Dockerfile
    container_name: e2e-django
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=e2e-django-secret-key
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,django
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - ANALYZER_BASE_URL=http://localhost:8083
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    container_name: e2e-backend
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - DB_CONN=postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
      - ANALYZER_BASE_URL=http://localhost:8083
      - BACKEND_API_KEY=${BACKEND_API_KEY:-lotus-backend-dev-key}
      - ANALYZER_API_KEY=${ANALYZER_API_KEY:-lotus-analyzer-dev-key}
    depends_on:
      postgres:
        condition: service_healthy
      django:
        condition: service_started

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile.e2e
    container_name: e2e-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - BACKEND_URL=http://backend:8080
      - AUTH_SECRET=${AUTH_SECRET:-e2e-test-secret-at-least-32-characters-long}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:-fake-github-id}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:-fake-github-secret}
      - AUTH_TRUST_HOST=true
      - BACKEND_API_KEY=${BACKEND_API_KEY:-lotus-backend-dev-key}
    depends_on:
      backend:
        condition: service_started

  # k6 load testing - run with:
  #   docker compose -f docker/docker-compose-e2e.yaml --profile load-test up -d --build --wait postgres backend
  #   docker compose -f docker/docker-compose-e2e.yaml --profile load-test run k6 run /scripts/http-gateway-load.js
  #   docker compose -f docker/docker-compose-e2e.yaml --profile load-test run -e PROFILE=average k6 run /scripts/http-gateway-load.js
  k6:
    image: grafana/k6:latest
    container_name: e2e-k6
    profiles:
      - load-test
    volumes:
      - ../services/backend/load-tests/scripts:/scripts
      - ../services/backend/load-tests/lib:/lib
      - ../services/backend/load-tests/third_party:/third_party
      - ../services/backend/proto:/proto
    environment:
      - BASE_URL=http://backend:8080
      - GRPC_ADDR=backend:50051
      - PROTO_ROOT=/
      - THIRD_PARTY_ROOT=/third_party
      - BACKEND_API_KEY=${BACKEND_API_KEY:-lotus-backend-dev-key}
    depends_on:
      backend:
        condition: service_started
