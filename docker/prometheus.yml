global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "lotus-backend"
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: /metrics

  - job_name: "lotus-frontend"
    static_configs:
      - targets: ["frontend:3000"]
    metrics_path: /api/metrics

  - job_name: "lotus-analyzer"
    static_configs:
      - targets: ["analyzer:8083"]
    metrics_path: /metrics
