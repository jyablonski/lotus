# Stack for k6 smoke tests in backend CI: Postgres, Django (migrations), Redis, backend.
#
# Usage:
#   docker compose -f docker/docker-compose-k6.yaml --profile load-test up -d --build --wait postgres redis django backend
#   docker compose -f docker/docker-compose-k6.yaml --profile load-test run k6 run /scripts/http-gateway-load.js
#   docker compose -f docker/docker-compose-k6.yaml --profile load-test down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: k6-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: k6-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ../services/django
      dockerfile: Dockerfile
    container_name: k6-django
    environment:
      - DJANGO_SECRET_KEY=k6-django-secret-key
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,django
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - ANALYZER_BASE_URL=http://localhost:8083
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  backend:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    container_name: k6-backend
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - DB_CONN=postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable&search_path=source,public
      - ANALYZER_BASE_URL=http://localhost:8083
      - BACKEND_API_KEY=${BACKEND_API_KEY:-lotus-backend-dev-key}
      - ANALYZER_API_KEY=${ANALYZER_API_KEY:-lotus-analyzer-dev-key}
      - REDIS_URL=redis://redis:6379
      # Set on host when testing k6 failure modes, e.g. LOADTEST_DELAY_RANDOM_STRING_MS=600 docker compose ... up
      - LOADTEST_DELAY_RANDOM_STRING_MS=${LOADTEST_DELAY_RANDOM_STRING_MS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy

  k6:
    image: grafana/k6:latest
    container_name: k6-runner
    profiles:
      - load-test
    volumes:
      - ../services/backend/load-tests/scripts:/scripts
      - ../services/backend/load-tests/lib:/lib
      - ../services/backend/load-tests/third_party:/third_party
      - ../services/backend/proto:/proto
    environment:
      - BASE_URL=http://backend:8080
      - GRPC_ADDR=backend:50051
      - PROTO_ROOT=/
      - THIRD_PARTY_ROOT=/third_party
      - BACKEND_API_KEY=${BACKEND_API_KEY:-lotus-backend-dev-key}
    depends_on:
      backend:
        condition: service_started
