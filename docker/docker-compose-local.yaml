# Docker Compose configuration for local development
# Used by:
#   - Tilt (combined with docker-compose-tilt.yaml override)
#   - CI/CD pipelines (GitHub Actions)
#   - Standalone Docker Compose (without Tilt)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${PWD}/docker/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - default
    restart: unless-stopped

  pact-broker:
    profiles: ["pact"]
    image: pactfoundation/pact-broker:latest
    container_name: pact-broker
    ports:
      - "9292:9292"
    environment:
      PACT_BROKER_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/pact_broker"
      PACT_BROKER_BASIC_AUTH_USERNAME: "pact"
      PACT_BROKER_BASIC_AUTH_PASSWORD: "pact"
      PACT_BROKER_LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  frontend:
    profiles: ["frontend"]
    build:
      context: ${PWD}/services/frontend
      dockerfile: Dockerfile
    image: frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ${PWD}/services/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - BACKEND_URL=http://backend:8080
      - BACKEND_API_KEY=${BACKEND_API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_RESEND_KEY=${AUTH_RESEND_KEY}
      - GA4_MEASUREMENT_ID=${GA4_MEASUREMENT_ID}
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      # Cap Node heap to reduce dev server memory (next dev is typically 1–1.5GB otherwise)
      - NODE_OPTIONS=--max-old-space-size=768
    depends_on:
      - backend
      - postgres
      - redis

  backend:
    profiles: ["backend"]
    build:
      context: ${PWD}/services/backend
      dockerfile: Dockerfile.dev
    image: backend
    container_name: backend
    ports:
      - "8080:8080"
      - "8081:8081"
      - "50051:50051"
    volumes:
      - ${PWD}/services/backend:/app
      - ${PWD}/services/backend/.air.toml:/app/.air.toml
    depends_on:
      - postgres
      - redis
    environment:
      - DB_CONN=postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable&search_path=source,public
      - ANALYZER_BASE_URL=http://analyzer:8083
      - BACKEND_API_KEY=${BACKEND_API_KEY}
      - ANALYZER_API_KEY=${ANALYZER_API_KEY}
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    working_dir: /app
    command: ["air", "-c", ".air.toml"]

  analyzer:
    profiles: ["analyzer"]
    build:
      context: ${PWD}/services/analyzer
      dockerfile: Dockerfile
    image: analyzer
    container_name: analyzer
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - ${PWD}/services/analyzer/src:/app/src
      - ${PWD}/services/analyzer/config.yaml:/app/config.yaml
    environment:
      - ENV_TYPE=docker_dev
      - MLFLOW_CONN_URI=http://mlflow:5000
      - ENABLE_V1_ROUTER=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANALYZER_API_KEY=${ANALYZER_API_KEY}
      - GIT_PYTHON_REFRESH=quiet
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - postgres
      - mlflow

  django_admin:
    profiles: ["django_admin"]
    build:
      context: ${PWD}/services/django
      dockerfile: Dockerfile
    image: django_admin
    container_name: django_admin
    ports:
      - "8000:8000"
    volumes:
      - ${PWD}/services/django:/app
      - django_venv:/app/.venv # preserve the built venv
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - ANALYZER_BASE_URL=http://analyzer:8083
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  mlflow:
    profiles: ["analyzer"]
    build:
      context: ${PWD}/services/experiments
      dockerfile: Dockerfile
    image: mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://postgres:postgres@postgres:5432/mlflow
      - MLFLOW_ARTIFACTS_DESTINATION=/mlflow/artifacts
    volumes:
      - ${PWD}/docker/mlflow/artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --workers 1
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1
    networks:
      - default

  dagster_base:
    profiles: ["dagster"]
    build:
      context: ${PWD}
      dockerfile: ./services/dagster/Dockerfile
    image: dagster_server_image
    container_name: dagster_base
    restart: always
    expose:
      - "4000"
    volumes:
      - ${PWD}/services/dagster/src:/app/src
      - ${PWD}/services/dbt:/app/dbt
      - dagster_io_storage:/tmp/io_manager_storage
    environment:
      - DAGSTER_POSTGRES_USER=postgres
      - DAGSTER_POSTGRES_PASSWORD=postgres
      - DAGSTER_POSTGRES_HOST=postgres
      - DAGSTER_POSTGRES_PORT=5432
      - DAGSTER_POSTGRES_DB=postgres
      - DAGSTER_CURRENT_IMAGE=dagster_server_image
      - DBT_PROFILES_DIR=/app/dbt/profiles
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=
      - FEAST_REPO_PATH=/app/feast_repo
      - API_KEY=fdwer424324aserdsfbbbb
      - API_BASE_URL=${API_BASE_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_DEFAULT_CHANNEL=${SLACK_DEFAULT_CHANNEL:-}
      - FEATURE_FLAGS_GOOGLE_SHEET_URL=${FEATURE_FLAGS_GOOGLE_SHEET_URL:-}
      - FEATURE_FLAGS_GOOGLE_SHEET_CREDENTIALS_JSON=${FEATURE_FLAGS_GOOGLE_SHEET_CREDENTIALS_JSON:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_PROMPT_GOOGLE_SHEET_URL=${LLM_PROMPT_GOOGLE_SHEET_URL:-}
      - LLM_PROMPT_GOOGLE_SHEET_CREDENTIALS_JSON=${LLM_PROMPT_GOOGLE_SHEET_CREDENTIALS_JSON:-}
      - OPENMETADATA_HOST_PORT=http://openmetadata_server:8585/api
      - OPENMETADATA_JWT_TOKEN=${OPENMETADATA_JWT_TOKEN:-}
    networks:
      - default
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  dagster_webserver:
    profiles: ["dagster"]
    image: dagster_server_image
    entrypoint: ["/app/entrypoint.sh"]
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
    container_name: dagster_webserver
    working_dir: /opt/dagster/dagster_home
    expose:
      - "3000"
    ports:
      - "3001:3000"
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=postgres
      - DAGSTER_POSTGRES_PASSWORD=postgres
      - DAGSTER_POSTGRES_HOST=postgres
      - DAGSTER_POSTGRES_DB=postgres
      - DAGSTER_POSTGRES_PORT=5432
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dagster_io_storage:/tmp/io_manager_storage
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
      dagster_base:
        condition: service_healthy

  dagster_daemon:
    profiles: ["dagster"]
    image: dagster_server_image
    entrypoint: ["/app/entrypoint.sh"]
    command:
      - dagster-daemon
      - run
      - -w
      - workspace.yaml
    container_name: dagster_daemon
    working_dir: /opt/dagster/dagster_home
    restart: on-failure
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=postgres
      - DAGSTER_POSTGRES_PASSWORD=postgres
      - DAGSTER_POSTGRES_HOST=postgres
      - DAGSTER_POSTGRES_DB=postgres
      - DAGSTER_POSTGRES_PORT=5432
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_DEFAULT_CHANNEL=${SLACK_DEFAULT_CHANNEL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dagster_io_storage:/tmp/io_manager_storage
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
      dagster_base:
        condition: service_started

  # ── Observability stack (OTel / Jaeger / Prometheus / Grafana) ──────────────
  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - default

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ${PWD}/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - default

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ${PWD}/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${PWD}/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - default

  # ── OpenMetadata (data catalog + lineage) ───────────────────────────────────
  # Infra only for now: server + search engine, wired to the shared postgres
  # (new `openmetadata_db`, see docker/db/01-bootstrap.sql). Ingestion connectors
  # for Dagster/dbt lineage are not wired yet, so the pipeline service client is
  # disabled to avoid the server trying to reach a nonexistent Airflow ingestion
  # container.
  opensearch:
    profiles: ["openmetadata"]
    image: opensearchproject/opensearch:3.3.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      # opensearchproject/opensearch bundles security-analytics, ML-commons,
      # alerting, and anomaly-detection plugins, all needing real off-heap
      # memory beyond the JVM heap itself — 512m was too tight and could get
      # OOM-killed under load (observed: ~1.1GiB RSS at idle). 1024m matches
      # what OpenMetadata's own upstream compose recommends for Elasticsearch.
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - default

  openmetadata_migrate:
    profiles: ["openmetadata"]
    image: docker.getcollate.io/openmetadata/server:1.13.1
    container_name: openmetadata_migrate
    # Self-heals if it ever races opensearch/postgres becoming truly ready
    # despite the health-gated depends_on below (e.g. under heavy concurrent
    # load when the whole Tilt stack boots at once); a one-shot container has
    # no restart policy by default, so a transient failure would otherwise
    # wedge openmetadata_server forever (its depends_on needs this to exit 0).
    restart: on-failure:5
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      - DB_DRIVER_CLASS=org.postgresql.Driver
      - DB_SCHEME=postgresql
      - DB_PARAMS=allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - DB_USER=postgres
      - DB_USER_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - OM_DATABASE=openmetadata_db
      - SEARCH_TYPE=opensearch
      - ELASTICSEARCH_HOST=opensearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_SCHEME=http
      - PIPELINE_SERVICE_CLIENT_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - default

  openmetadata_server:
    profiles: ["openmetadata"]
    image: docker.getcollate.io/openmetadata/server:1.13.1
    container_name: openmetadata_server
    restart: unless-stopped
    ports:
      - "8585:8585"
      - "8586:8586"
    environment:
      - DB_DRIVER_CLASS=org.postgresql.Driver
      - DB_SCHEME=postgresql
      - DB_PARAMS=allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - DB_USER=postgres
      - DB_USER_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - OM_DATABASE=openmetadata_db
      - SEARCH_TYPE=opensearch
      - ELASTICSEARCH_HOST=opensearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_SCHEME=http
      - PIPELINE_SERVICE_CLIENT_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      openmetadata_migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:8586/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - default

networks:
  default:
    name: lotus_default
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  dagster_io_storage:
  grafana_data:
  django_venv:
  opensearch_data:
